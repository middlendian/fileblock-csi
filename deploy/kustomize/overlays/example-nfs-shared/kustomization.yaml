apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Example overlay: backing store is a single NFS export mounted at the same
# path on every node. All nodes advertise the same topology segment, so the
# external-provisioner sees them as interchangeable landing zones for any
# PV created in this store.
#
# Edit the `server`/`path` fields in patch-controller.yaml and patch-node.yaml
# to match your NFS export. Cross-node mutual exclusion comes from CSI's
# SINGLE_NODE_WRITER serialization, not a fileblock-side lease, so the NFS
# server's lock manager is not on the critical path.

namespace: fileblock-system

resources:
  - ../../base

# Image tag is inherited from base/kustomization.yaml — `latest` on the
# `main` branch, `vX.Y.Z` on a release tag.

patches:
  - path: patch-controller.yaml
    target:
      kind: Deployment
      name: fileblock-controller
  - path: patch-node.yaml
    target:
      kind: DaemonSet
      name: fileblock-node
