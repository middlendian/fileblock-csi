apiVersion: apps/v1
kind: Deployment
metadata:
  name: fileblock-controller
  namespace: fileblock-system
spec:
  template:
    spec:
      containers:
        - name: fileblock-controller
          args:
            - --endpoint=unix:///csi/csi.sock
            - --backing-store=/var/lib/fileblock
            - --topology-key=fileblock.csi/backing-store
            - --log-level=info
      volumes:
        - name: backing-store
          # Replace with your NFS export. Every fileblock node DaemonSet pod
          # must see the same files under /var/lib/fileblock.
          nfs:
            server: nfs.example.internal
            path: /exports/fileblock
