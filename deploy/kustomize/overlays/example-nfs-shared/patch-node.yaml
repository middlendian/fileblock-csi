apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fileblock-node
  namespace: fileblock-system
spec:
  template:
    spec:
      containers:
        - name: fileblock-node
          args:
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --state-dir=/var/lib/kubelet/plugins/fileblock.csi
            - --backing-store=/var/lib/fileblock
            - --topology-key=fileblock.csi/backing-store
            - --topology-value=nfs-shared
            - --log-level=info
      volumes:
        - name: backing-store
          # Same NFS export as the controller. Cross-node mutual exclusion
          # comes from CSI's SINGLE_NODE_WRITER serialization, so neither
          # NLM (NFSv3) nor server-side locks are on the critical path.
          nfs:
            server: nfs.example.internal
            path: /exports/fileblock
