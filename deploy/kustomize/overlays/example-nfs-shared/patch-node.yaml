apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fileblock-node
  namespace: fileblock-system
spec:
  template:
    spec:
      containers:
        - name: fileblock-node
          args:
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --state-dir=/var/lib/kubelet/plugins/fileblock.csi
            - --backing-store=/var/lib/fileblock
            - --topology-key=fileblock.csi/backing-store
            - --topology-value=nfs-shared
            - --log-level=info
      volumes:
        - name: backing-store
          # Same NFS export as the controller. The kernel flock held on each
          # .img file is what keeps two nodes from staging the same volume
          # at once; on NFSv3 this requires NLM (rpc.statd/lockd), on NFSv4
          # it is built into the protocol.
          nfs:
            server: nfs.example.internal
            path: /exports/fileblock
