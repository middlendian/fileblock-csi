# Same hostPath surface for the node DaemonSet so LocalMounter can
# bind-mount the backing-store path on every scheduled node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fileblock-node
spec:
  template:
    spec:
      containers:
        - name: fileblock-node
          volumeMounts:
            - name: host-source
              mountPath: /tmp/fileblock-e2e
      volumes:
        - name: host-source
          hostPath:
            path: /tmp/fileblock-e2e
            type: DirectoryOrCreate
