# Surfaces /tmp/fileblock-e2e from the host into the controller pod so
# LocalMounter's bind-mount source has a real path in the pod's mount namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fileblock-controller
spec:
  template:
    spec:
      containers:
        - name: fileblock-controller
          volumeMounts:
            - name: host-source
              mountPath: /tmp/fileblock-e2e
      volumes:
        - name: host-source
          hostPath:
            path: /tmp/fileblock-e2e
            type: DirectoryOrCreate
