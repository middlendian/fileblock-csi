# Surfaces /srv/fileblock-source from the host into the controller pod so
# LocalMounter's bind-mount source has a real path in the pod's mount namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fileblock-controller
spec:
  template:
    spec:
      containers:
        - name: fileblock-controller
          volumeMounts:
            - name: host-source
              mountPath: /srv/fileblock-source
      volumes:
        - name: host-source
          hostPath:
            path: /srv/fileblock-source
            type: DirectoryOrCreate
