apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fileblock-node
  namespace: fileblock-system
spec:
  template:
    spec:
      containers:
        - name: fileblock-node
          imagePullPolicy: IfNotPresent
          args:
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --state-dir=/var/lib/kubelet/plugins/fileblock.csi
            - --backing-store=/var/lib/fileblock
            - --topology-key=fileblock.csi/backing-store
            - --topology-value=e2e-shared
            - --log-level=debug
