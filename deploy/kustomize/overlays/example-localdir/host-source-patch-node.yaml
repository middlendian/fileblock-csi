# Same hostPath surface for the node DaemonSet's container.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fileblock-node
spec:
  template:
    spec:
      containers:
        - name: fileblock-node
          volumeMounts:
            - name: host-source
              mountPath: /var/lib/fileblock-localdir
      volumes:
        - name: host-source
          hostPath:
            path: /var/lib/fileblock-localdir
            type: DirectoryOrCreate
