apiVersion: apps/v1
kind: Deployment
metadata:
  name: fileblock-controller
  namespace: fileblock-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fileblock-controller
  template:
    metadata:
      labels:
        app: fileblock-controller
    spec:
      serviceAccountName: fileblock-controller
      # hostNetwork so the source IP of mount.nfs is the host's, not
      # the pod CIDR. NFS server export ACLs typically allow the
      # cluster's host network, not pod IPs. Matches csi-driver-nfs's
      # controller and node pods. dnsPolicy: ClusterFirstWithHostNet
      # keeps Kubernetes DNS working under hostNetwork.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: fileblock-controller
          image: ghcr.io/middlendian/fileblock-csi:dev
          imagePullPolicy: IfNotPresent
          command: [/usr/local/bin/fileblock-controller]
          args:
            - --endpoint=unix:///csi/csi.sock
            - --stores-root=/var/lib/fileblock/stores
            - --log-level=info
          securityContext:
            # privileged: true is necessary because NFSv3's lock manager
            # binds a privileged source port. SYS_ADMIN alone is rejected
            # under most LSM profiles when nfsvers=3 is used. Matches
            # csi-driver-nfs's controller pod and our own node DaemonSet.
            # drop: [ALL] tightens the posture: the explicit add-back of
            # SYS_ADMIN is the only capability the container retains.
            privileged: true
            capabilities:
              add: [SYS_ADMIN]
              drop: [ALL]
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: stores
              mountPath: /var/lib/fileblock/stores
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.0.1
          args:
            - --csi-address=/csi/csi.sock
            - --feature-gates=Topology=true
            - --leader-election
            - --leader-election-namespace=fileblock-system
            # NFSv3 mount via mount.nfs userland can exceed the
            # default 15s gRPC timeout on first connect (portmapper +
            # mountd RPC roundtrips). Match csi-driver-nfs's posture
            # so CreateVolume doesn't get killed mid-mount.
            - --timeout=1200s
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.11.1
          args:
            - --csi-address=/csi/csi.sock
            - --leader-election
            - --leader-election-namespace=fileblock-system
            # Same rationale as csi-provisioner above.
            - --timeout=1200s
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
        - name: liveness-probe
          image: registry.k8s.io/sig-storage/livenessprobe:v2.13.1
          args:
            - --csi-address=/csi/csi.sock
            # Bind to localhost on a controller-specific port. Default
            # is 0.0.0.0:9808 — under hostNetwork: true, every pod with
            # this sidecar binds the same host port and they collide
            # (controller pod + node DaemonSet pod scheduled on the
            # same host). Distinct localhost ports per pod-role solve
            # it without exposing the probe externally. Matches
            # csi-driver-nfs (their controller uses 29652, node 29653).
            - --http-endpoint=localhost:29652
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: stores
          emptyDir: {}
