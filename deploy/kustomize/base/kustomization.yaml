apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - csidriver.yaml
  - rbac.yaml
  - controller-deployment.yaml
  - node-daemonset.yaml

# `newTag` tracks the most recent release. `hack/cut-release.sh` bumps it
# to the new vX.Y.Z on every release PR, so:
#   tag vX.Y.Z -> vX.Y.Z
#   main       -> vX.Y.Z (same as the latest release)
# Both `?ref=main` and `?ref=vX.Y.Z` (latest release) resolve to the same
# multi-arch image. People who want bleeding-edge use the :dev image
# build, not main.
images:
  - name: ghcr.io/middlendian/fileblock-csi
    newTag: v0.3.2
