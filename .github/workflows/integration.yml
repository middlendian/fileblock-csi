name: Integration

# Runs the local smoke and CSI sanity scripts as root on a hosted Ubuntu
# runner. These need real loop devices, mkfs.ext4, and friends. They run on
# push to main, on every PR, and via workflow_dispatch. PRs from forks still
# execute against the runner itself (no secrets, no external services), so
# the privileged-access concern doesn't apply.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: hack/smoke.sh
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            e2fsprogs util-linux git
      - name: Install csc (kubernetes-csi client)
        run: |
          go install github.com/rexray/gocsi/csc@latest
          # `make smoke` runs the script via sudo, and sudo's secure_path
          # ignores GOBIN. Drop the binary into /usr/local/bin so root sees it.
          sudo install -m 0755 "$(go env GOPATH)/bin/csc" /usr/local/bin/csc
      - run: make smoke

  csi-sanity:
    name: hack/csi-sanity.sh
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            e2fsprogs util-linux
      - name: Install csi-sanity
        run: |
          go install github.com/kubernetes-csi/csi-test/v5/cmd/csi-sanity@latest
          sudo install -m 0755 "$(go env GOPATH)/bin/csi-sanity" /usr/local/bin/csi-sanity
      - run: make sanity
