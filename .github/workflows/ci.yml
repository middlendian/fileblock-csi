name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.x"
  GOLANGCI_LINT_VERSION: "v2.5.0"

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs util-linux git

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "$GOLANGCI_LINT_VERSION"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install csc and csi-sanity
        run: |
          go install github.com/rexray/gocsi/csc@latest
          go install github.com/kubernetes-csi/csi-test/v5/cmd/csi-sanity@latest
          # smoke + sanity run via `sudo`, whose secure_path ignores GOBIN.
          # Drop both helper binaries into /usr/local/bin so root sees them.
          sudo install -m 0755 "$(go env GOPATH)/bin/csc" /usr/local/bin/csc
          sudo install -m 0755 "$(go env GOPATH)/bin/csi-sanity" /usr/local/bin/csi-sanity

      - run: make check

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: cover.out
