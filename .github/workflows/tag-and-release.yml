name: Tag and release

# Triggered by every push to `main`. When the head commit looks like a
# release PR landing — squash-merged ("release: vX.Y.Z (#N)" as subject)
# or merge-committed ("release: vX.Y.Z" anywhere in the message body) —
# this workflow:
#   1. Creates and pushes the `vX.Y.Z` tag.
#   2. Calls the reusable `release.yml` workflow to build multi-arch
#      images and create the GitHub release.
#
# Also exposes a `workflow_dispatch` escape hatch for re-running a
# release manually (e.g. when a CI flake aborted publish, or a release
# commit sat un-detected and the broken-but-completed run can't be
# replayed in place).
#
# Non-release pushes no-op out at the `detect` step — `is_release` falls
# to `false` and the downstream jobs skip via `if`.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.1) — bypasses commit detection"
        type: string
        required: true

permissions:
  contents: write   # push tag, create GitHub release
  packages: write   # push images to ghcr.io

jobs:
  detect:
    name: Detect release commit
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is_release: ${{ steps.detect.outputs.is_release }}
    steps:
      - uses: actions/checkout@v6
      - id: detect
        env:
          MSG: ${{ github.event.head_commit.message }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # workflow_dispatch path: explicit version wins.
          if [ -n "$DISPATCH_VERSION" ]; then
            echo "version=$DISPATCH_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::workflow_dispatch override: version=$DISPATCH_VERSION"
            exit 0
          fi

          # Push path. Both squash and merge-commit modes leave the line
          # `release: vX.Y.Z` somewhere in the message:
          #   squash    -> subject:   "release: vX.Y.Z (#N)"
          #   merge-cmt -> subject:   "Merge pull request #N from owner/release/vX.Y.Z"
          #                body:      "release: vX.Y.Z"
          # So scan all lines, not just the subject.
          re='^release:[[:space:]]+(v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?)([[:space:]]+\(#[0-9]+\))?$'
          version=""
          while IFS= read -r line; do
            if [[ "$line" =~ $re ]]; then
              version="${BASH_REMATCH[1]}"
              break
            fi
          done <<< "$MSG"

          if [ -n "$version" ]; then
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Detected release commit for $version"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Head commit message has no 'release: vX.Y.Z' line; skipping."
          fi

  tag:
    name: Create ${{ needs.detect.outputs.version }} tag
    needs: detect
    if: ${{ needs.detect.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Create and push tag
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::notice::tag $VERSION already exists locally; skipping create"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "$VERSION" >/dev/null 2>&1; then
            echo "::notice::tag $VERSION already exists on origin; skipping create"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"

  release:
    name: Build and publish ${{ needs.detect.outputs.version }}
    needs: [detect, tag]
    if: ${{ needs.detect.outputs.is_release == 'true' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      version: ${{ needs.detect.outputs.version }}
