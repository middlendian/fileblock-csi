name: Tag and release

# Triggered when a release PR (head branch `release/vX.Y.Z`) is merged
# into `main`. The version is read from the head branch name via the
# pull_request event payload — no commit-message parsing — so squash and
# merge-commit modes both work without ceremony from the merger.
#
# What this workflow does:
#   1. Creates and pushes the `vX.Y.Z` tag at the merge commit.
#   2. Calls the reusable `release.yml` workflow to build multi-arch
#      images and create the GitHub release.
#
# Also exposes a `workflow_dispatch` escape hatch for re-running a
# release manually (e.g. when a CI flake aborted publish, or a release
# slipped past the trigger and the broken-but-completed run can't be
# replayed in place).
#
# Non-release PR closes no-op via the job-level `if`: only PRs whose
# head ref starts with `release/v` and that were actually merged kick
# the rest of the pipeline. Closed-without-merge ends at the no-op.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.1) — bypasses PR detection"
        type: string
        required: true

permissions:
  contents: write   # push tag, create GitHub release
  packages: write   # push images to ghcr.io

jobs:
  detect:
    name: Detect release PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    outputs:
      version: ${{ steps.detect.outputs.version }}
      sha: ${{ steps.detect.outputs.sha }}
    steps:
      - id: detect
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          re='^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'

          if [ -n "$DISPATCH_VERSION" ]; then
            version="$DISPATCH_VERSION"
            sha="${{ github.sha }}"
            echo "::notice::workflow_dispatch override: version=$version"
          else
            version="${PR_HEAD_REF#release/}"
            sha="$PR_MERGE_SHA"
            echo "::notice::Detected release PR: head=$PR_HEAD_REF version=$version"
          fi

          if [[ ! "$version" =~ $re ]]; then
            echo "::error::version $version does not look like vX.Y.Z[-prerelease]"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  tag:
    name: Create ${{ needs.detect.outputs.version }} tag
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Verify kustomization newTag matches release version
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          KUSTOMIZATION="deploy/kustomize/base/kustomization.yaml"
          TAG=$(awk '/^[[:space:]]+newTag:/ {print $2; exit}' "$KUSTOMIZATION")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::$KUSTOMIZATION newTag ($TAG) does not match release version ($VERSION)"
            exit 1
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::notice::tag $VERSION already exists locally; skipping create"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "$VERSION" >/dev/null 2>&1; then
            echo "::notice::tag $VERSION already exists on origin; skipping create"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"

  release:
    name: Build and publish ${{ needs.detect.outputs.version }}
    needs: [detect, tag]
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      version: ${{ needs.detect.outputs.version }}
