name: Release

# Reusable workflow. Called by `tag-and-release.yml` after it auto-creates
# the `vX.Y.Z` tag from a `release: vX.Y.Z` merge commit on `main`. Not
# triggered directly by tag pushes — under tag protection, only the
# `github-actions[bot]` is allowed to push tags, and the auto-tag job in
# `tag-and-release.yml` is the one that does it.
on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        type: string
        required: true

permissions:
  contents: write   # create GitHub release + upload assets
  packages: write   # push images to ghcr.io

env:
  GO_VERSION: "1.25.x"
  IMAGE: ghcr.io/middlendian/fileblock-csi

jobs:
  image:
    name: Image (${{ matrix.suffix }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: ubuntu-latest,    platform: linux/amd64, suffix: amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64, suffix: arm64 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the tag we just created. Default ref would be `main`
          # (the caller's ref), which points at the same SHA right now,
          # but pinning to the tag is more explicit.
          ref: ${{ inputs.version }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          # Native runner — no QEMU, no emulation, single platform per job.
          platforms: ${{ matrix.platform }}
          # Don't add provenance attestations; they bloat the manifest list
          # we assemble in the next job and confuse simple `imagetools create`.
          provenance: false
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.version }}-${{ matrix.suffix }}
          build-args: |
            VERSION=${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=fileblock-csi
            org.opencontainers.image.description=Kubernetes CSI driver providing real ext4 filesystems on shared backing stores
            org.opencontainers.image.url=https://github.com/middlendian/fileblock-csi
            org.opencontainers.image.source=https://github.com/middlendian/fileblock-csi
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

  manifest:
    name: Multi-arch manifest
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ inputs.version }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine arches into ${{ env.TAG }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      # Tag :latest only on non-prerelease tags. SemVer prereleases are
      # detected by the presence of `-` (e.g. v0.1.0-rc1).
      - name: Tag :latest
        if: ${{ !contains(inputs.version, '-') }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}
          # GoReleaser needs the full history to compute version metadata.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Extract release notes from CHANGELOG.md
        env:
          # Write outside the worktree — GoReleaser refuses to release with
          # any untracked files in the tree, and adding to .gitignore would
          # be an in-source workaround for a CI-only artifact.
          NOTES: ${{ runner.temp }}/release-notes.md
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          SEMVER="${VERSION#v}"
          awk -v v="$SEMVER" '
            /^## \[/ {
              if (printing) exit
              if ($0 ~ "^## \\["v"\\]") { printing = 1; next }
            }
            printing && /^\[.+\]:/ { exit }
            printing { print }
          ' CHANGELOG.md > "$NOTES"

          if [ ! -s "$NOTES" ]; then
            echo "::error::No CHANGELOG entry for $VERSION — expected '## [$SEMVER]' heading"
            exit 1
          fi

          echo "::group::Release notes for $VERSION"
          cat "$NOTES"
          echo "::endgroup::"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bypass git tag detection — we passed the version explicitly.
          GORELEASER_CURRENT_TAG: ${{ inputs.version }}
