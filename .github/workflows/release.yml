name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub release + upload assets
  packages: write   # push images to ghcr.io

env:
  GO_VERSION: "1.25.x"
  IMAGE: ghcr.io/middlendian/fileblock-csi

jobs:
  image:
    name: Image (${{ matrix.suffix }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: ubuntu-latest,    platform: linux/amd64, suffix: amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64, suffix: arm64 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          # Native runner — no QEMU, no emulation, single platform per job.
          platforms: ${{ matrix.platform }}
          # Don't add provenance attestations; they bloat the manifest list
          # we assemble in the next job and confuse simple `imagetools create`.
          provenance: false
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}-${{ matrix.suffix }}
          build-args: |
            VERSION=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=fileblock-csi
            org.opencontainers.image.description=Kubernetes CSI driver providing real ext4 filesystems on shared backing stores
            org.opencontainers.image.url=https://github.com/middlendian/fileblock-csi
            org.opencontainers.image.source=https://github.com/middlendian/fileblock-csi
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

  manifest:
    name: Multi-arch manifest
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine arches into ${{ env.TAG }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      # Tag :latest only on non-prerelease tags. SemVer prereleases are
      # detected by the presence of `-` (e.g. v0.1.0-rc1).
      - name: Tag :latest
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          # GoReleaser needs the full history to compute version metadata.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            /^## \[/ {
              if (printing) exit
              if ($0 ~ "^## \\["v"\\]") { printing = 1; next }
            }
            printing && /^\[.+\]:/ { exit }
            printing { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG entry for v$VERSION — expected '## [$VERSION]' heading"
            exit 1
          fi

          echo "::group::Release notes for $VERSION"
          cat release-notes.md
          echo "::endgroup::"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
