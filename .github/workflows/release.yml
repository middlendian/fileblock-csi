name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub release + upload assets
  packages: write   # push images to ghcr.io

env:
  GO_VERSION: "1.25.x"

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser needs the full history to compute version metadata.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            /^## \[/ {
              if (printing) exit
              if ($0 ~ "^## \\["v"\\]") { printing = 1; next }
            }
            printing && /^\[.+\]:/ { exit }
            printing { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG entry for v$VERSION — expected '## [$VERSION]' heading"
            exit 1
          fi

          echo "::group::Release notes for $VERSION"
          cat release-notes.md
          echo "::endgroup::"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
