version: 2

project_name: fileblock-csi

before:
  hooks:
    - go mod tidy

builds:
  - id: controller
    main: ./cmd/controller
    binary: fileblock-controller
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/middlendian/fileblock-csi/pkg/driver.Version={{ .Version }}
    goos: [linux]
    goarch: [amd64, arm64]
  - id: node
    main: ./cmd/node
    binary: fileblock-node
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/middlendian/fileblock-csi/pkg/driver.Version={{ .Version }}
    goos: [linux]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# Container images are built and pushed by `.github/workflows/release.yml`
# directly, on native amd64 + arm64 runners (no QEMU). GoReleaser only
# handles binaries, archives, and the GitHub release here.
release:
  github:
    owner: middlendian
    name: fileblock-csi
  prerelease: auto
  draft: false

# Release notes are sourced from CHANGELOG.md via --release-notes in the
# workflow; disable goreleaser's git-log-based body so it does not append.
changelog:
  disable: true
