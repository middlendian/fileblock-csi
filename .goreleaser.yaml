version: 2

project_name: fileblock-csi

before:
  hooks:
    - go mod tidy

builds:
  - id: controller
    main: ./cmd/controller
    binary: fileblock-controller
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/middlendian/fileblock-csi/pkg/driver.Version={{ .Version }}
    goos: [linux]
    goarch: [amd64, arm64]
  - id: node
    main: ./cmd/node
    binary: fileblock-node
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/middlendian/fileblock-csi/pkg/driver.Version={{ .Version }}
    goos: [linux]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

dockers:
  - id: amd64
    use: buildx
    goos: linux
    goarch: amd64
    ids: [controller, node]
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/middlendian/fileblock-csi:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Kubernetes CSI driver providing real ext4 filesystems on shared backing stores"
      - "--label=org.opencontainers.image.url=https://github.com/middlendian/fileblock-csi"
      - "--label=org.opencontainers.image.source=https://github.com/middlendian/fileblock-csi"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=GPL-3.0-or-later"
  - id: arm64
    use: buildx
    goos: linux
    goarch: arm64
    ids: [controller, node]
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/middlendian/fileblock-csi:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Kubernetes CSI driver providing real ext4 filesystems on shared backing stores"
      - "--label=org.opencontainers.image.url=https://github.com/middlendian/fileblock-csi"
      - "--label=org.opencontainers.image.source=https://github.com/middlendian/fileblock-csi"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=GPL-3.0-or-later"

docker_manifests:
  - name_template: "ghcr.io/middlendian/fileblock-csi:{{ .Version }}"
    image_templates:
      - "ghcr.io/middlendian/fileblock-csi:{{ .Version }}-amd64"
      - "ghcr.io/middlendian/fileblock-csi:{{ .Version }}-arm64"
  # `:latest` is only pushed for non-prerelease tags. GoReleaser's `auto`
  # prerelease detection treats v1.2.3-rc1 as a prerelease and skips the
  # docker_manifests entry below; v1.2.3 publishes :latest as well.
  - name_template: "ghcr.io/middlendian/fileblock-csi:latest"
    skip_push: auto
    image_templates:
      - "ghcr.io/middlendian/fileblock-csi:{{ .Version }}-amd64"
      - "ghcr.io/middlendian/fileblock-csi:{{ .Version }}-arm64"

release:
  github:
    owner: middlendian
    name: fileblock-csi
  prerelease: auto
  draft: false

# Release notes are sourced from CHANGELOG.md via --release-notes in the
# workflow; disable goreleaser's git-log-based body so it does not append.
changelog:
  disable: true
